services:
  - type: web
    name: my-portfolio-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        value: gtilahun2121@gmail.com
      - key: EMAIL_PASS
        sync: false  # Add manually in Render dashboard
      - key: FRONTEND_URL
        value: https://my-portfolio-frontend.vercel.app

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free